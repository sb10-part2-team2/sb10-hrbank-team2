spring:
  application:
    name: hrbank
  config:
    activate:
      on-profile: prod # 배포 환경 프로필
  datasource:
    driver-class-name: org.postgresql.Driver
    # .env에 민감 정보 저장
    # IntelliJ 플러그인 사용해 값 연동 -> EnvFile
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # create - 시작 시 drop + create
      ddl-auto: none # Hiberante 기본 DDL 기능 끄기
    defer-datasource-initialization: false # Hibernate가 테이블 생성 후 data.sql을 실행하도록 설정
    properties:
      hibernate:
        format_sql: false # 로그에 출력되는 SQL 포맷팅
        use_sql_comments: false # 로그 주석 추가
    open-in-view: false # OSIV 비활성화

  sql:
    init:
      mode: never # 시작 시 항상 SQL 스크립트 실행

logging:
  level:
    # SQL 문장출력 끔(debug -> info)
    org.hibernate.SQL: info # 실행되는 SQL 문장 로그로 출력
    # 파라미터 바인딩 출력 끔(trace -> info)
    org.hibernate.orm.jdbc.bind: info # 바인딩 파라미터 값을 로그로 출력

hrbank:
  storage:
    local:
      root-path: .hrbank/storage
      # @Value("${hrbank.storage.local.root-path}") 를 통해서 할당됨
  backup:
    # 1시간(3600000ms)마다 실행
    interval-ms: 3600000

    # 백업 시점에 저장된 파일들을 500개씩 나누어서 백업
    batch-size: 500
